<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocalHub | 게시물 상세</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --mint-50: #f4fdfb;
        --mint-100: #dbf5ee;
        --mint-500: #47bfa6;
        --ink-700: #25433d;
        --ink-500: #5d7570;
        --white: #fff;
      }

      body {
        margin: 0;
        font-family: "Noto Sans KR", sans-serif;
        background: linear-gradient(135deg, var(--mint-50), #fff 70%);
        color: var(--ink-700);
        padding: 24px;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
      }

      .card {
        background: var(--white);
        border: 1px solid var(--mint-100);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: 0 8px 20px rgba(35, 67, 61, 0.04);
      }

      .meta {
        color: var(--ink-500);
        font-size: 0.95rem;
      }

      .back-btn {
        display: inline-block;
        margin-bottom: 12px;
        padding: 8px 12px;
        border-radius: 8px;
        background: #eefaf7;
        color: var(--mint-500);
        text-decoration: none;
        font-weight: 700;
      }

      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        gap: 12px;
      }

      .delete-post-btn {
        background: #ff6b6b;
        color: #fff;
        border: none;
        padding: 10px 14px;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        margin-left: 0;
      }

      .comment-form textarea {
        width: 100%;
        min-height: 100px;
        border: 1px solid #e6eef0;
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 8px;
      }

      .comment-row {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      .comment-row input {
        flex: 1;
        min-width: 180px;
        padding: 8px;
        border: 1px solid #e6eef0;
        border-radius: 8px;
      }

      .comment-list {
        display: grid;
        gap: 10px;
      }

      .comment-item {
        background: #fafafa;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #f0f4f4;
      }

      .comment-meta {
        font-size: 0.85rem;
        color: var(--ink-500);
        margin-bottom: 6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .btn {
        background: var(--mint-500);
        color: #fff;
        padding: 8px 12px;
        border-radius: 8px;
        border: none;
        font-weight: 700;
        cursor: pointer;
      }

      .danger {
        background: #ff6b6b;
      }

      .chatbot {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 999;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: flex-end;
        gap: 10px;
      }

      .chat-window {
        width: 320px;
        background: white;
        border: 1px solid var(--mint-100);
        border-radius: 20px;
        padding: 16px;
        box-shadow: 0 16px 40px rgba(35, 67, 61, 0.16);
      }

      .chat-window h4 {
        margin: 0 0 10px;
      }

      .message {
        background: var(--mint-50);
        padding: 8px 10px;
        border-radius: 10px;
        margin-bottom: 8px;
        font-size: 0.92rem;
        line-height: 1.5;
        word-break: break-word;
      }

      .message.loading {
        color: var(--ink-500);
        font-style: italic;
      }

      .chat-input {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .chat-input input {
        flex: 1;
        border: 1px solid var(--mint-200);
        border-radius: 999px;
        padding: 10px 12px;
      }

      .chat-input button {
        border: none;
        border-radius: 999px;
        padding: 10px 12px;
        background: var(--mint-500);
        color: white;
      }

      .chat-toggle {
        border: none;
        border-radius: 999px;
        background: var(--mint-500);
        color: white;
        padding: 14px 18px;
        font-weight: 800;
        box-shadow: 0 10px 24px rgba(71, 191, 166, 0.3);
      }

      @media (max-width: 560px) {
        .container {
          padding: 18px;
        }

        .chat-window {
          width: 280px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app" class="container">
      <div class="header-row">
        <a class="back-btn" href="Front_community.html">← 목록으로</a>
        <button class="delete-post-btn" @click="deletePost">게시글 삭제</button>
      </div>

      <div v-if="post" class="card">
        <h2>{{ post.title }}</h2>
        <div class="meta">{{ post.categoryLabel }} · {{ post.date }}</div>
        <hr style="margin:12px 0" />
        <div v-html="post.content"></div>
      </div>

      <div class="card">
        <h3>댓글 ({{ comments.length }})</h3>

        <div class="comment-list" v-if="comments.length">
          <div class="comment-item" v-for="c in comments" :key="c.id">
            <div class="comment-meta">
              <div>{{ c.nickname || c.name || "익명" }} · {{ c.date }}</div>
              <div>
                <button class="btn danger" @click="tryDeleteComment(c)">삭제</button>
              </div>
            </div>
            <div>{{ c.content }}</div>
          </div>
        </div>

        <div v-else class="meta" style="margin-bottom:12px">
          등록된 댓글이 없습니다.
        </div>

        <hr style="margin:12px 0" />

        <div class="comment-form">
          <textarea v-model="newComment.content" placeholder="댓글을 입력하세요"></textarea>
          <div class="comment-row">
            <input v-model="newComment.nickname" placeholder="닉네임을 입력하세요" />
            <input
              v-model="newComment.password"
              placeholder="비밀번호 (삭제용)"
              type="password"
            />
            <button class="btn" @click="addComment">등록</button>
          </div>
        </div>
      </div>

      <div id="chat" class="chatbot">
        <div v-if="chatOpen" class="chat-window">
          <h4>LocalHub 챗봇</h4>
          <div
            v-for="(msg, index) in chatMessages"
            :key="index"
            class="message"
            :class="{ 'loading': msg.isLoading }"
          >
            {{ msg.text }}
          </div>

          <div class="chat-input">
            <input
              v-model="chatInput"
              @keyup.enter="sendMessage"
              placeholder="질문을 입력하세요 (예: 구미 맛집 추천)"
              :disabled="isChatLoading"
            />
            <button @click="sendMessage" :disabled="isChatLoading">전송</button>
          </div>
        </div>

        <button class="chat-toggle" @click="chatOpen = !chatOpen">
          {{ chatOpen ? "닫기" : "💬 챗봇" }}
        </button>
      </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
      const { createApp } = Vue;
      const API_BASE_URL = "https://backendserver-tuvk.onrender.com";

      createApp({
        data() {
          return {
            postId: null,
            post: null,
            comments: [],
            newComment: {
              nickname: "",
              password: "",
              content: ""
            },
            useServerComments: false,
            chatOpen: false,
            chatInput: "",
            isChatLoading: false,
            chatMessages: [
              { text: "안녕하세요! 구미·경북권 지역 정보를 도와드릴게요.", isLoading: false },
              { text: "예: “구미 라면 축제 일정”, “금오산 맛집 추천”, “관광 코스”라고 말해보세요.", isLoading: false }
            ]
          };
        },
        mounted() {
          const params = new URLSearchParams(location.search);
          this.postId = params.get("post_id");
          if (!this.postId) {
            alert("잘못된 게시물입니다.");
            location.href = "Front_community.html";
            return;
          }

          this.fetchPost();
          this.loadComments();
        },
        methods: {
          async fetchPost() {
            try {
              const res = await fetch(`${API_BASE_URL}/posts/${this.postId}`);
              if (!res.ok) throw new Error("post not found");

              const data = await res.json();
              const catMap = {
                1: "관광지",
                2: "음식점",
                3: "축제",
                4: "숙박",
                5: "쇼핑",
                6: "문화시설",
                7: "레포츠",
                8: "여행코스"
              };

              this.post = {
                id: data.id,
                title: data.title || "제목 없음",
                content: data.content || "",
                categoryLabel:
                  data.category_name && String(data.category_name).trim()
                    ? String(data.category_name).trim()
                    : catMap[data.category_id] || "기타",
                date: data.created_at ? data.created_at.split(" ")[0] : "방금 전",
                password: data.password || ""
              };
            } catch (e) {
              console.warn("게시물 로드 실패:", e);
              this.post = {
                title: "게시물을 불러올 수 없습니다.",
                content: "",
                categoryLabel: "",
                date: "",
                password: ""
              };
            }
          },

          async loadComments() {
            const key = `comments_${this.postId}`;
            try {
              const res = await fetch(`${API_BASE_URL}/comments?post_id=${this.postId}`);
              if (res.ok) {
                const data = await res.json();
                const items = Array.isArray(data)
                  ? data
                  : Array.isArray(data.comments)
                  ? data.comments
                  : [];
                const filtered = items.filter(
                  (item) =>
                    String(item.post_id) === String(this.postId) ||
                    String(item.postId) === String(this.postId)
                );

                if (filtered.length) {
                  this.comments = filtered.map((item) => ({
                    id: item.id,
                    nickname: item.nickname || item.name,
                    content: item.content,
                    date: item.created_at || item.date || new Date().toLocaleString(),
                    createdAt:
                      item.created_at && !isNaN(Date.parse(item.created_at))
                        ? Date.parse(item.created_at)
                        : item.createdAt || Date.now(),
                    password: item.password || "",
                    postId: String(this.postId),
                    source: "server"
                  }));
                  this.useServerComments = true;
                  this.sortComments();
                  return;
                }
              }
            } catch (e) {
              console.warn("서버 댓글 조회 불가:", e);
            }

            const raw = localStorage.getItem(key);
            this.comments = raw ? JSON.parse(raw) : [];
            this.comments = this.comments
              .filter((c) => String(c.postId) === String(this.postId))
              .map((c) => ({ ...c, source: c.source || "local" }));
            this.sortComments();
          },

          saveComments() {
            const key = `comments_${this.postId}`;
            localStorage.setItem(key, JSON.stringify(this.comments));
          },

          async addComment() {
            if (!this.newComment.nickname.trim()) {
              alert("닉네임을 입력해주세요.");
              return;
            }
            if (!this.newComment.password.trim()) {
              alert("비밀번호를 입력해주세요.");
              return;
            }
            if (!this.newComment.content.trim()) {
              alert("댓글을 입력해주세요.");
              return;
            }

            const commentPayload = {
              post_id: Number(this.postId),
              nickname: this.newComment.nickname.trim(),
              password: this.newComment.password.trim(),
              content: this.newComment.content.trim()
            };

            try {
              const res = await fetch(`${API_BASE_URL}/comments`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(commentPayload)
              });

              if (!res.ok) {
                const errorData = await res.json().catch(() => null);
                throw new Error(errorData?.detail || "댓글 등록 실패");
              }

              const saved = await res.json();
              const item = {
                id: saved.id || Date.now(),
                nickname: saved.nickname || commentPayload.nickname,
                content: saved.content || commentPayload.content,
                date: saved.created_at || saved.date || new Date().toLocaleString(),
                createdAt:
                  saved.created_at && !isNaN(Date.parse(saved.created_at))
                    ? Date.parse(saved.created_at)
                    : Date.now(),
                password: commentPayload.password,
                postId: String(this.postId),
                source: "server"
              };

              this.comments.unshift(item);
              this.sortComments();
              this.saveComments();
              this.newComment = { nickname: "", password: "", content: "" };
            } catch (e) {
              console.warn("백엔드 댓글 등록 실패:", e);

              const item = {
                id: Date.now(),
                nickname: commentPayload.nickname,
                content: commentPayload.content,
                date: new Date().toLocaleString(),
                createdAt: Date.now(),
                password: commentPayload.password,
                postId: String(this.postId),
                source: "local"
              };

              this.comments.unshift(item);
              this.sortComments();
              this.saveComments();
              this.newComment = { nickname: "", password: "", content: "" };
            }
          },

          sortComments() {
            this.comments.sort((a, b) => {
              const aTime =
                typeof a.createdAt === "number"
                  ? a.createdAt
                  : Date.parse(a.createdAt || a.date || "");
              const bTime =
                typeof b.createdAt === "number"
                  ? b.createdAt
                  : Date.parse(b.createdAt || b.date || "");
              return bTime - aTime;
            });
          },

          async deletePost() {
            if (!this.post || !this.post.id) return;

            const pwd = prompt("게시물 삭제 비밀번호를 입력하세요");
            if (pwd === null) return;
            if (!pwd.trim()) {
              alert("비밀번호를 입력해주세요.");
              return;
            }

            if (pwd !== this.post.password) {
              alert("비밀번호가 일치하지 않습니다.");
              return;
            }

            try {
              const res = await fetch(`${API_BASE_URL}/posts/${this.postId}`, {
                method: "DELETE"
              });

              if (!res.ok) {
                const errorData = await res.json().catch(() => null);
                throw new Error(errorData?.detail || "게시물 삭제 실패");
              }

              alert("게시물이 삭제되었습니다.");
              location.href = "Front_community.html";
            } catch (e) {
              console.warn("게시물 삭제 실패:", e);
              alert("게시물 삭제에 실패했습니다.");
            }
          },

          async tryDeleteComment(comment) {
            const pwd = prompt("댓글 삭제 비밀번호를 입력하세요");
            if (pwd === null) return;
            if (pwd !== comment.password) {
              alert("비밀번호가 일치하지 않습니다.");
              return;
            }

            if (comment.source === "server") {
              try {
                const res = await fetch(
                  `${API_BASE_URL}/comments/${comment.id}?password=${encodeURIComponent(pwd)}`,
                  {
                    method: "DELETE"
                  }
                );
                if (!res.ok) {
                  const errorData = await res.json().catch(() => null);
                  throw new Error(errorData?.detail || "삭제 실패");
                }
              } catch (e) {
                console.warn("서버 댓글 삭제 실패:", e);
              }
            }

            this.comments = this.comments.filter((c) => c.id !== comment.id);
            this.saveComments();
          },

          async sendMessage() {
            const text = this.chatInput.trim();
            if (!text) return;

            this.chatMessages.push({ text: `질문: ${text}`, isLoading: false });
            this.chatInput = "";
            this.isChatLoading = true;

            const loadingIndex = this.chatMessages.length;
            this.chatMessages.push({ text: "답변을 생각 중입니다...", isLoading: true });

            try {
              const response = await fetch(`${API_BASE_URL}/chatbot/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
              });

              if (!response.ok) {
                this.chatMessages[loadingIndex] = { text: "답변: 챗봇 서버 응답에 문제가 있습니다.", isLoading: false };
                return;
              }

              const data = await response.json();
              let reply = data?.reply ?? (typeof data === "string" ? data : JSON.stringify(data));

              try {
                const logsResp = await fetch(`${API_BASE_URL}/chatbot/logs`);
                if (logsResp.ok) {
                  const logsJson = await logsResp.json();

                  const extractAssistant = (obj) => {
                    if (!obj) return null;
                    if (typeof obj === "string") return obj;
                    if (Array.isArray(obj)) return extractAssistant(obj[obj.length - 1]);
                    if (obj.reply) return obj.reply;
                    if (obj.text) return obj.text;
                    if (obj.message) return obj.message;
                    if (obj.messages && Array.isArray(obj.messages)) {
                      for (let i = obj.messages.length - 1; i >= 0; i--) {
                        const m = obj.messages[i];
                        if (m.role === "assistant") return m.content ?? m.text ?? m.message ?? null;
                      }
                    }
                    if (obj.choices && Array.isArray(obj.choices) && obj.choices.length) {
                      const lastChoice = obj.choices[obj.choices.length - 1];
                      const msg = lastChoice.message || lastChoice;
                      return msg?.content ?? msg?.text ?? null;
                    }
                    return null;
                  };

                  const logReply = extractAssistant(logsJson);
                  if (logReply) reply = logReply;
                }
              } catch (err) {
                console.debug("chatbot/logs 호출 실패 또는 없음:", err);
              }

              this.chatMessages[loadingIndex] = { text: `답변: ${reply}`, isLoading: false };
            } catch (error) {
              console.warn("챗봇 API 호출 실패, 로컬 답변으로 대체", error);
              this.chatMessages[loadingIndex] = { text: `답변: ${this.generateFallbackAnswer(text)} (오프라인)`, isLoading: false };
            } finally {
              this.isChatLoading = false;
              setTimeout(() => {
                const win = document.querySelector(".chat-window");
                if (win) win.scrollTop = win.scrollHeight;
              }, 50);
            }
          },

          generateFallbackAnswer(text) {
            if (text.includes("축제")) return "이번 주 구미의 대표 축제인 '구미 라면 축제' 일정을 확인해보세요!";
            if (text.includes("맛집") || text.includes("식당")) return "금오산 주변, 혹은 원평동 쪽에서 가성비 좋은 선산곱창 맛집을 추천해드릴 수 있어요.";
            if (text.includes("관광") || text.includes("코스")) return "금오산 도립공원, 동락공원, 에코랜드 순으로 방문하시는 코스를 추천해드립니다.";
            return "원하시는 구미·경북권 지역 정보나 축제, 맛집 관련 질문을 조금 더 구체적으로 보내주세요.";
          }
        }
      }).mount("#app");
    </script>
  </body>
</html>
